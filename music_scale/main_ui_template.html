<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Music Scale Finder</title>
  <script>
    (function () {
      var key = "music_scale_theme";
      try {
        var stored = localStorage.getItem(key);
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
          return;
        }
      } catch (_error) {
        // ignore storage errors
      }
      if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <style>
    :root {
      --bg-top: #f7f4ef;
      --bg-bottom: #eef4fb;
      --halo-a: rgba(29, 144, 120, 0.23);
      --halo-b: rgba(204, 122, 59, 0.17);

      --ink: #152233;
      --ink-soft: #42556f;
      --ink-muted: #56718b;

      --panel: #ffffff;
      --panel-strong: #ffffff;
      --line: #d4deea;
      --focus-ring: rgba(79, 142, 214, 0.45);

      --btn: #f7fbff;
      --btn-border: #bfd0e3;
      --btn-active: #e9f2ff;
      --btn-active-border: #7b9ec1;

      --accent: #1d9078;
      --accent-strong: #167562;
      --accent-warm: #cc7a3b;
      --accent-warm-strong: #b16428;
      --violet: #6f5ef2;
      --violet-strong: #5b48db;
      --ok: #1d7a44;
      --warn: #b16428;

      --shadow: 0 14px 30px rgba(21, 39, 64, 0.12);
      --shadow-soft: 0 8px 18px rgba(21, 39, 64, 0.12);
      --glass-edge: #dfe8f3;
      --glass-glint: rgba(255, 255, 255, 0.45);
      --texture-opacity: 0.03;
      --panel-blur: 0px;
      --orb-a: rgba(89, 187, 167, 0.18);
      --orb-b: rgba(130, 165, 220, 0.18);
      --orb-c: rgba(214, 150, 103, 0.16);
      --orb-d: rgba(255, 255, 255, 0.15);

      --mono: "JetBrains Mono", "Consolas", "Courier New", monospace;
      --sans: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      --serif: "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    html[data-theme="dark"] {
      --bg-top: #0c1724;
      --bg-bottom: #122334;
      --halo-a: rgba(44, 166, 139, 0.22);
      --halo-b: rgba(203, 126, 63, 0.24);

      --ink: #e5edf7;
      --ink-soft: #afc3d8;
      --ink-muted: #8ea8c3;

      --panel: #132234;
      --panel-strong: #132234;
      --line: #2a3c52;
      --focus-ring: rgba(125, 175, 235, 0.55);

      --btn: #1b2d42;
      --btn-border: #38516b;
      --btn-active: #22394f;
      --btn-active-border: #4f7398;

      --accent: #43c1a2;
      --accent-strong: #2ea58a;
      --accent-warm: #d6904f;
      --accent-warm-strong: #bf7639;
      --violet: #7f72ff;
      --violet-strong: #654eff;
      --ok: #58c47b;
      --warn: #d6904f;

      --shadow: 0 16px 34px rgba(2, 8, 15, 0.42);
      --shadow-soft: 0 9px 20px rgba(2, 8, 15, 0.34);
      --glass-edge: #2a3c52;
      --glass-glint: rgba(186, 216, 255, 0.08);
      --texture-opacity: 0.02;
      --orb-a: rgba(36, 186, 162, 0.14);
      --orb-b: rgba(88, 138, 236, 0.16);
      --orb-c: rgba(232, 145, 92, 0.13);
      --orb-d: rgba(146, 184, 234, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--sans);
      position: relative;
      isolation: isolate;
      overflow-x: hidden;
      background:
        radial-gradient(1000px 560px at -8% 0%, var(--halo-a), transparent 68%),
        radial-gradient(980px 520px at 100% -18%, var(--halo-b), transparent 67%),
        linear-gradient(170deg, var(--bg-top) 0%, #f1f4fa 54%, var(--bg-bottom) 100%);
      transition: background-color 0.28s ease, color 0.28s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.02;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255, 255, 255, 0.1) 0 1px,
          transparent 1px 3px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(15, 23, 42, 0.05) 0 1px,
          transparent 1px 4px
        ),
        radial-gradient(
          1200px 620px at 20% -10%,
          rgba(255, 255, 255, 0.26),
          transparent 65%
        );
      mix-blend-mode: soft-light;
    }

    .ambient-shapes {
      display: none;
    }

    .ambient-shapes span {
      position: absolute;
      border-radius: 999px;
      filter: blur(78px);
      transform: translate3d(0, 0, 0);
      opacity: 0.85;
    }

    .ambient-shapes .shape-a {
      width: clamp(260px, 30vw, 420px);
      height: clamp(260px, 30vw, 420px);
      top: -8%;
      left: -6%;
      background: var(--orb-a);
    }

    .ambient-shapes .shape-b {
      width: clamp(260px, 28vw, 390px);
      height: clamp(260px, 28vw, 390px);
      top: 14%;
      right: -7%;
      background: var(--orb-b);
    }

    .ambient-shapes .shape-c {
      width: clamp(220px, 24vw, 340px);
      height: clamp(220px, 24vw, 340px);
      bottom: 6%;
      right: 10%;
      background: var(--orb-c);
    }

    .ambient-shapes .shape-d {
      width: clamp(200px, 22vw, 320px);
      height: clamp(200px, 22vw, 320px);
      bottom: -6%;
      left: 18%;
      background: var(--orb-d);
    }

    .wrap {
      width: min(1320px, calc(100% - 42px));
      margin: 24px auto 24px;
      display: grid;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .hero,
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before,
    .panel::before {
      display: none;
    }

    .hero > *,
    .panel > * {
      position: relative;
      z-index: 1;
    }

    .hero {
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 260px;
    }

    .brand-mark {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      color: #ffffff;
      background: linear-gradient(145deg, var(--violet), var(--violet-strong));
      box-shadow: 0 8px 18px rgba(95, 80, 213, 0.3);
      flex: 0 0 auto;
    }

    .hero h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(1.6rem, 2.4vw, 2.1rem);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .subtitle {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn,
    .link-btn,
    .toggle-btn,
    .sound-toggle {
      min-height: 50px;
      border: 1px solid var(--btn-border);
      border-radius: 18px;
      padding: 0 22px;
      background: linear-gradient(160deg, #ffffff 0%, var(--btn) 100%);
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0;
      box-shadow: 0 4px 10px rgba(25, 45, 72, 0.08);
      transition: transform 0.16s ease, border-color 0.16s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover,
    .link-btn:hover,
    .toggle-btn:hover,
    .sound-toggle:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--btn-border) 55%, var(--ink) 45%);
    }

    html[data-theme="dark"] .btn,
    html[data-theme="dark"] .link-btn,
    html[data-theme="dark"] .toggle-btn,
    html[data-theme="dark"] .sound-toggle,
    html[data-theme="dark"] .note-btn,
    html[data-theme="dark"] .fret-btn {
      color: #d8e6f7;
      border-color: var(--btn-border);
      background: var(--btn);
    }

    .toggle-btn {
      border-color: color-mix(in srgb, var(--btn-border) 80%, #ffffff 20%);
    }

    .link-btn {
      color: #ffffff;
      border-color: transparent;
      background: linear-gradient(145deg, var(--violet) 0%, var(--violet-strong) 100%);
      box-shadow: 0 8px 18px rgba(95, 80, 213, 0.34);
    }

    .sound-toggle {
      color: #ffffff;
      border-color: var(--accent-warm-strong);
      background: linear-gradient(145deg, var(--accent-warm) 0%, #dd8c4d 100%);
      box-shadow: 0 8px 16px rgba(177, 100, 40, 0.24);
    }

    .sound-toggle.muted {
      color: #f2f6fb;
      border-color: #567490;
      background: linear-gradient(145deg, #5f7e98 0%, #49647b 100%);
      box-shadow: 0 6px 12px rgba(52, 73, 93, 0.32);
    }

    #clear-btn::before {
      content: "\1F5D1";
      font-size: 0.9rem;
      line-height: 1;
      margin-right: 9px;
    }

    .btn:focus-visible,
    .link-btn:focus-visible,
    .toggle-btn:focus-visible,
    .sound-toggle:focus-visible,
    .note-btn:focus-visible,
    .fret-btn:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .btn.primary {
      border-color: var(--btn-border);
      color: var(--ink);
      background: linear-gradient(160deg, #ffffff 0%, var(--btn) 100%);
    }

    .panel {
      padding: 14px;
      background: var(--panel-strong);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-family: var(--serif);
      font-size: clamp(1.35rem, 1.9vw, 1.9rem);
      letter-spacing: 0.02em;
      color: var(--ink);
      line-height: 1.1;
    }

    .note-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .note-btn,
    .fret-btn {
      width: 100%;
      border: 1px solid var(--btn-border);
      border-radius: 13px;
      background: linear-gradient(160deg, #ffffff 0%, var(--btn) 100%);
      color: var(--ink);
      cursor: pointer;
      font-weight: 600;
      font-family: var(--sans);
      transition: transform 0.1s ease, border-color 0.1s ease, background 0.1s ease;
    }

    .note-btn {
      padding: 10px 6px;
      min-height: 44px;
      font-size: 0.98rem;
    }

    .fret-btn {
      min-height: 36px;
      padding: 5px 6px;
      font-size: 0.9rem;
    }

    .note-btn:hover,
    .fret-btn:hover {
      transform: translateY(-1px);
    }

    .note-btn.active,
    .fret-btn.active {
      color: #ffffff;
      background: linear-gradient(145deg, var(--violet) 0%, var(--violet-strong) 100%);
      border-color: color-mix(in srgb, var(--violet-strong) 80%, #ffffff 20%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .session-row {
      margin-top: 11px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .selected {
      margin: 0;
      color: var(--ink);
      font-family: var(--mono);
      font-size: 0.9rem;
    }

    .fretboard-scroll {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel-strong) 80%, transparent 20%);
      backdrop-filter: blur(calc(var(--panel-blur) * 0.58));
      -webkit-backdrop-filter: blur(calc(var(--panel-blur) * 0.58));
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 980px;
    }

    thead th {
      color: var(--ink-muted);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
    }

    tbody td {
      padding: 6px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      white-space: nowrap;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    th:first-child,
    td:first-child {
      position: sticky;
      left: 0;
      z-index: 1;
      text-align: left;
      min-width: 122px;
      background: color-mix(in srgb, var(--panel-strong) 92%, transparent 8%);
      font-weight: 700;
      color: var(--ink);
    }

    thead th:first-child {
      background: color-mix(in srgb, var(--violet) 14%, var(--panel-strong) 86%);
    }

    .status {
      margin: 0 0 8px;
      color: var(--ink);
      font-weight: 700;
    }

    .status.warn {
      color: var(--warn);
    }

    .status.ok {
      color: var(--ok);
    }

    .results {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 330px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: color-mix(in srgb, var(--panel-strong) 84%, transparent 16%);
      backdrop-filter: blur(calc(var(--panel-blur) * 0.58));
      -webkit-backdrop-filter: blur(calc(var(--panel-blur) * 0.58));
    }

    .results li {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      font-family: var(--mono);
      font-size: 0.86rem;
      color: var(--ink);
      line-height: 1.42;
    }

    .results li:last-child {
      border-bottom: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 8px;
    }

    .panel-head h2 {
      margin: 0;
    }

    .panel-icon {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 1.1rem;
      background: linear-gradient(145deg, var(--violet) 0%, var(--violet-strong) 100%);
      box-shadow: 0 7px 15px rgba(95, 80, 213, 0.3);
    }

    html[data-theme="dark"] .fretboard-scroll,
    html[data-theme="dark"] .results {
      background: color-mix(in srgb, var(--panel-strong) 74%, transparent 26%);
    }

    html[data-theme="dark"] .sound-toggle {
      color: #ffffff;
      border-color: var(--accent-warm-strong);
      background: linear-gradient(145deg, #c78243 0%, #a96933 100%);
      box-shadow: 0 8px 16px rgba(49, 24, 8, 0.38);
    }

    html[data-theme="dark"] .sound-toggle.muted {
      border-color: #50667d;
      background: linear-gradient(145deg, #52697f 0%, #3f5368 100%);
      box-shadow: 0 6px 12px rgba(2, 8, 15, 0.48);
    }

    html[data-theme="dark"] thead th:first-child {
      background: color-mix(in srgb, var(--violet) 18%, var(--panel-strong) 82%);
    }

    @media (max-width: 960px) {
      .note-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      .wrap {
        width: calc(100% - 14px);
        margin-top: 10px;
      }

      .hero,
      .panel {
        border-radius: 14px;
      }

      .hero {
        padding: 12px;
      }

      .panel {
        padding: 11px;
      }

      .note-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .subtitle {
        font-size: 0.88rem;
      }

      .hero-brand {
        gap: 10px;
      }

      .brand-mark {
        width: 50px;
        height: 50px;
        font-size: 1.45rem;
      }

      .btn,
      .link-btn,
      .toggle-btn,
      .sound-toggle {
        min-height: 44px;
        padding: 0 16px;
        font-size: 0.93rem;
      }

      .note-btn {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-shapes" aria-hidden="true">
    <span class="shape-a"></span>
    <span class="shape-b"></span>
    <span class="shape-c"></span>
    <span class="shape-d"></span>
  </div>
  <main class="wrap">
    <section class="hero">
      <div class="hero-brand">
        <span class="brand-mark" aria-hidden="true">♪</span>
        <div>
        <h1>Music Scale Finder</h1>
        <p class="subtitle">Click notes or guitar frets. Matches update live after at least 3 unique notes.</p>
        </div>
      </div>
      <div class="hero-actions">
        <button id="theme-toggle" class="toggle-btn" type="button" aria-label="Toggle dark mode">Dark</button>
        <button id="sound-toggle" class="sound-toggle" type="button" aria-label="Mute all sounds">Sound On</button>
        <a class="link-btn" href="/transcriber">Open Transcriber</a>
      </div>
    </section>

    <section class="panel">
      <h2>Note Palette</h2>
      <div id="note-grid" class="note-grid"></div>
      <div class="session-row">
        <button id="clear-btn" class="btn" type="button">Clear All</button>
        <p id="selected-text" class="selected">0 unique: (none)</p>
      </div>
    </section>

    <section class="panel">
      <h2>Guitar Input (Standard Tuning)</h2>
      <div class="fretboard-scroll">
        <table>
          <thead id="fret-head"></thead>
          <tbody id="fret-body"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <span class="panel-icon" aria-hidden="true">✦</span>
        <h2>Matching Scales</h2>
      </div>
      <p id="status" class="status">Loading...</p>
      <ul id="results" class="results"></ul>
    </section>
  </main>

  <script>
    (() => {
      const THEME_KEY = 'music_scale_theme';
      const SOUND_KEY = 'music_scale_sound';

      const selectedNotes = new Set();
      let config = null;

      const noteGrid = document.getElementById('note-grid');
      const clearBtn = document.getElementById('clear-btn');
      const selectedText = document.getElementById('selected-text');
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');
      const fretHead = document.getElementById('fret-head');
      const fretBody = document.getElementById('fret-body');
      const themeToggle = document.getElementById('theme-toggle');
      const soundToggle = document.getElementById('sound-toggle');

      const noteButtons = new Map();
      const fretButtonsByNote = new Map();
      let requestToken = 0;

      function getTheme() {
        return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      }

      function setTheme(theme) {
        const next = theme === 'dark' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        try {
          localStorage.setItem(THEME_KEY, next);
        } catch (_error) {
          // ignore storage errors
        }
      }

      function syncThemeToggle() {
        const dark = getTheme() === 'dark';
        themeToggle.textContent = dark ? 'Light' : 'Dark';
        themeToggle.setAttribute('aria-pressed', dark ? 'true' : 'false');
      }

      function getStoredSoundEnabled() {
        try {
          const raw = localStorage.getItem(SOUND_KEY);
          if (raw === 'on') {
            return true;
          }
          if (raw === 'off') {
            return false;
          }
        } catch (_error) {
          return null;
        }
        return null;
      }

      function setStoredSoundEnabled(enabled) {
        try {
          localStorage.setItem(SOUND_KEY, enabled ? 'on' : 'off');
        } catch (_error) {
          // ignore storage errors
        }
      }

      function setSoundEnabled(enabled) {
        setStoredSoundEnabled(enabled);
        if (enabled) {
          soundToggle.textContent = 'Sound On';
          soundToggle.classList.remove('muted');
          soundToggle.setAttribute('aria-label', 'Mute all sounds');
        } else {
          soundToggle.textContent = 'Muted';
          soundToggle.classList.add('muted');
          soundToggle.setAttribute('aria-label', 'Unmute sounds');
        }
      }

      function noteOrder(note) {
        if (!config) {
          return 999;
        }
        const idx = config.chromatic_notes.indexOf(note);
        return idx === -1 ? 999 : idx;
      }

      function orderedSelected() {
        return Array.from(selectedNotes).sort((a, b) => noteOrder(a) - noteOrder(b));
      }

      function setStatus(text, kind) {
        statusEl.textContent = text;
        statusEl.className = 'status' + (kind ? ' ' + kind : '');
      }

      function updateSelectedText() {
        const ordered = orderedSelected();
        if (ordered.length === 0) {
          selectedText.textContent = '0 unique: (none)';
          return;
        }
        selectedText.textContent = ordered.length + ' unique: ' + ordered.join(', ');
      }

      function addFretButton(note, button) {
        if (!fretButtonsByNote.has(note)) {
          fretButtonsByNote.set(note, []);
        }
        fretButtonsByNote.get(note).push(button);
      }

      function toggleNote(note) {
        if (selectedNotes.has(note)) {
          selectedNotes.delete(note);
        } else {
          selectedNotes.add(note);
        }
        refreshUI();
      }

      function refreshButtonStates() {
        noteButtons.forEach((button, note) => {
          button.classList.toggle('active', selectedNotes.has(note));
        });

        fretButtonsByNote.forEach((buttons, note) => {
          const active = selectedNotes.has(note);
          for (const button of buttons) {
            button.classList.toggle('active', active);
          }
        });
      }

      async function refreshMatches() {
        const ordered = orderedSelected();
        resultsEl.innerHTML = '';

        if (ordered.length < config.min_notes) {
          const needed = config.min_notes - ordered.length;
          setStatus('Waiting for at least ' + config.min_notes + ' unique notes (' + needed + ' more needed).', 'warn');
          return;
        }

        const token = ++requestToken;
        setStatus('Finding matching scales...', '');

        try {
          const response = await fetch('/api/match', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notes: ordered }),
          });

          let payload = null;
          try {
            payload = await response.json();
          } catch (_error) {
            payload = null;
          }

          if (token !== requestToken) {
            return;
          }

          if (!response.ok) {
            const message = payload && payload.error ? payload.error : 'Failed to fetch matches.';
            setStatus(message, 'warn');
            return;
          }

          const matches = payload.matches || [];
          if (matches.length === 0) {
            setStatus('No matching scales found for this note group.', 'warn');
            return;
          }

          setStatus(matches.length + ' matching scales found.', 'ok');
          for (const match of matches) {
            const item = document.createElement('li');
            const notes = Array.isArray(match.scale_notes) ? match.scale_notes.join(', ') : '';
            item.textContent = match.label + ' -> ' + notes;
            resultsEl.appendChild(item);
          }
        } catch (_error) {
          if (token !== requestToken) {
            return;
          }
          setStatus('Connection error while matching scales.', 'warn');
        }
      }

      function refreshUI() {
        updateSelectedText();
        refreshButtonStates();
        void refreshMatches();
      }

      function renderNoteButtons() {
        noteGrid.innerHTML = '';
        noteButtons.clear();

        for (const note of config.chromatic_notes) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'note-btn';
          button.textContent = note;
          button.addEventListener('click', () => toggleNote(note));
          noteGrid.appendChild(button);
          noteButtons.set(note, button);
        }
      }

      function renderFretboard() {
        fretButtonsByNote.clear();
        fretHead.innerHTML = '';
        fretBody.innerHTML = '';

        const headRow = document.createElement('tr');
        const firstHead = document.createElement('th');
        firstHead.textContent = 'String / Fret';
        headRow.appendChild(firstHead);

        for (let fret = 0; fret <= config.max_fret; fret += 1) {
          const th = document.createElement('th');
          th.textContent = String(fret);
          headRow.appendChild(th);
        }
        fretHead.appendChild(headRow);

        for (const row of config.strings) {
          const tr = document.createElement('tr');
          const label = document.createElement('td');
          label.textContent = row.string + ' (' + row.open_note_name + ')';
          tr.appendChild(label);

          for (const fretData of row.frets) {
            const td = document.createElement('td');
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'fret-btn';
            button.textContent = fretData.note;
            button.title = row.string + ' fret ' + fretData.fret + ' -> ' + fretData.note_name;
            button.addEventListener('click', () => toggleNote(fretData.note));
            addFretButton(fretData.note, button);
            td.appendChild(button);
            tr.appendChild(td);
          }

          fretBody.appendChild(tr);
        }
      }

      async function init() {
        syncThemeToggle();
        themeToggle.addEventListener('click', () => {
          const next = getTheme() === 'dark' ? 'light' : 'dark';
          setTheme(next);
          syncThemeToggle();
        });
        const initialSound = getStoredSoundEnabled();
        setSoundEnabled(initialSound !== null ? initialSound : true);
        soundToggle.addEventListener('click', () => {
          setSoundEnabled(soundToggle.classList.contains('muted'));
        });

        window.addEventListener('storage', (event) => {
          if (event.key === THEME_KEY) {
            const storedTheme = event.newValue === 'dark' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', storedTheme);
            syncThemeToggle();
          }
          if (event.key === SOUND_KEY) {
            const stored = getStoredSoundEnabled();
            setSoundEnabled(stored !== null ? stored : true);
          }
        });

        clearBtn.disabled = true;
        setStatus('Loading configuration...', '');

        clearBtn.addEventListener('click', () => {
          selectedNotes.clear();
          refreshUI();
        });

        try {
          const response = await fetch('/api/config');
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload && payload.error ? payload.error : 'Failed to load configuration.');
          }

          config = payload;
          renderNoteButtons();
          renderFretboard();
          clearBtn.disabled = false;
          refreshUI();
        } catch (error) {
          const message = error instanceof Error ? error.message : 'Failed to load configuration.';
          setStatus(message, 'warn');
          selectedText.textContent = 'Unable to initialize UI.';
        }
      }

      void init();
    })();
  </script>
</body>
</html>
